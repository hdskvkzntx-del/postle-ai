<!DOCTYPE html>
<html lang=en>
<head>
    <meta charset=UTF-8>
    <meta name=viewport content=width=device-width, initial-scale=1.0>
    <title>Postle.ai</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        h1 { font-size: 3.5rem; font-weight: 700; letter-spacing: -1px; }
        h1 span { color: #6366f1; }
        p { margin-top: 1rem; font-size: 1.2rem; color: #888; max-width: 480px; }
        a {
            margin-top: 2rem;
            display: inline-block;
            background: #6366f1;
            color: #fff;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }
        a:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <h1>Postle<span>.ai</span></h1>
    <p>Your data-driven content coach. Grow faster with insights that tell you exactly what to post, when, and why.</p>
    <a href=#>Get Early Access</a>
</body>
</html>
